# ══════════════════════════════════════════════════════════════════════════════
# Playwright E2E – Push to main
#
# PURPOSE:
#   On every push to `main`, run the full Playwright suite against the deployed
#   sandbox (https://eventhub.rahulshettyacademy.com) and upload the HTML report
#   as a downloadable workflow artifact.
#
# NOTES:
#   - playwright.config.ts already pins baseURL to the deployed env, so no
#     backend/frontend services need to start in CI.
#   - Chromium-only (matches playwright.config.ts `projects`).
#   - Report is always uploaded — pass or fail — so failures can be triaged.
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21.7.1'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test-results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 30
